<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAROT CLUB — Premium Athletic Wear</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{--cream:#FAF7F2;--warm:#FFFEF9;--gold:#C8922A;--gold-l:#E8B84B;--gold-p:#FDF3DC;--dark:#1C1C1E;--dark2:#2D2D30;--gray:#6B6B6B;--lg:#E8E4DC;--border:#DDD8CE;--sh:rgba(28,28,30,.08);--shd:rgba(28,28,30,.18)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--warm);color:var(--dark);overflow-x:hidden;cursor:none}
.cur{width:10px;height:10px;background:var(--gold);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .1s,width .3s,height .3s}
.cur-r{width:36px;height:36px;border:1.5px solid var(--gold);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:transform .18s ease,width .3s,height .3s;opacity:.6}
.cur.h{width:20px;height:20px;background:var(--gold-l)}
.cur-r.h{width:58px;height:58px;opacity:.25}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 5%;display:flex;align-items:center;justify-content:space-between;height:70px;transition:background .4s,box-shadow .4s}
nav.s{background:rgba(255,254,249,.95);backdrop-filter:blur(16px);box-shadow:0 1px 0 var(--border)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.12em;color:var(--dark);text-decoration:none}
.logo b{color:var(--gold)}
.nav-l{display:flex;gap:36px;list-style:none}
.nav-l a{text-decoration:none;font-size:13px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--dark);position:relative;transition:color .2s}
.nav-l a::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:1.5px;background:var(--gold);transform:scaleX(0);transform-origin:left;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.nav-l a:hover{color:var(--gold)}
.nav-l a:hover::after{transform:scaleX(1)}
.nav-r{display:flex;align-items:center;gap:18px}
.ni{background:none;border:none;cursor:none;color:var(--dark);padding:6px;position:relative;transition:color .2s}
.ni:hover{color:var(--gold)}
.cc{position:absolute;top:0;right:0;width:16px;height:16px;background:var(--gold);color:white;border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.nbtn{background:var(--dark);color:white;border:none;padding:10px 22px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:none;transition:background .2s,transform .2s}
.nbtn:hover{background:var(--gold);transform:translateY(-1px)}
.hbg{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:none;padding:6px}
.hbg span{display:block;width:24px;height:2px;background:var(--dark);transition:all .3s}

/* HERO */
.hero{min-height:100vh;background:var(--cream);display:grid;grid-template-columns:1fr 1fr;position:relative;overflow:hidden}
.hl{display:flex;flex-direction:column;justify-content:center;padding:130px 6% 80px 8%;position:relative;z-index:2}
.htag{display:inline-flex;align-items:center;gap:10px;font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:28px;opacity:0;animation:fu .8s .2s ease forwards}
.htag::before{content:'';width:28px;height:1.5px;background:var(--gold)}
.hh{font-family:'Playfair Display',serif;font-size:clamp(52px,6vw,88px);font-weight:900;line-height:1;letter-spacing:-.02em;color:var(--dark);margin-bottom:28px;opacity:0;animation:fu .9s .35s ease forwards}
.hh em{font-style:italic;color:var(--gold);display:block}
.hs{font-size:16px;font-weight:300;line-height:1.7;color:var(--gray);max-width:400px;margin-bottom:44px;opacity:0;animation:fu .9s .5s ease forwards}
.ha{display:flex;gap:16px;align-items:center;flex-wrap:wrap;opacity:0;animation:fu .9s .65s ease forwards}
.btp{background:var(--dark);color:white;padding:16px 36px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;border:none;cursor:none;text-decoration:none;display:inline-block;transition:background .25s,transform .25s,box-shadow .25s;position:relative;overflow:hidden}
.btp::before{content:'';position:absolute;inset:0;background:var(--gold);transform:translateX(-101%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
.btp:hover::before{transform:translateX(0)}
.btp span{position:relative;z-index:1}
.btp:hover{transform:translateY(-2px);box-shadow:0 8px 24px var(--shd)}
.bto{background:transparent;color:var(--dark);padding:15px 32px;border:1.5px solid var(--dark);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:none;text-decoration:none;display:inline-block;transition:all .25s}
.bto:hover{background:var(--dark);color:white;transform:translateY(-2px)}
.hstats{display:flex;gap:36px;margin-top:60px;opacity:0;animation:fu .9s .8s ease forwards}
.si{border-left:2px solid var(--gold);padding-left:14px}
.sn{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--dark);line-height:1}
.sl{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);margin-top:4px}
.hr{position:relative;overflow:hidden;opacity:0;animation:fi 1.2s .3s ease forwards}
.hbdg{position:absolute;bottom:48px;left:-28px;background:white;padding:20px 24px;box-shadow:0 20px 60px var(--shd);display:flex;align-items:center;gap:14px;animation:flt 4s ease-in-out infinite}
.hbi{width:44px;height:44px;background:var(--gold-p);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px}
.hbt p:first-child{font-size:13px;font-weight:600;color:var(--dark)}
.hbt p:last-child{font-size:11px;color:var(--gray);margin-top:2px}
.hscr{position:absolute;bottom:32px;left:6%;display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;animation:fi 1s 1.2s ease forwards}
.scrl{width:1px;height:50px;background:linear-gradient(to bottom,transparent,var(--gold));animation:sp 2s ease-in-out infinite}
.scrt{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gray)}

/* MARQUEE */
.mq{background:var(--dark);padding:17px 0;overflow:hidden;border-top:2px solid var(--gold)}
.mt{display:flex;animation:mq 25s linear infinite;width:max-content}
.mi{display:flex;align-items:center;gap:32px;padding:0 40px;font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.45);white-space:nowrap}
.mi span{color:var(--gold);font-size:16px}

/* SECTION HEAD */
.sh{text-align:center;margin-bottom:64px}
.stag{display:inline-flex;align-items:center;gap:12px;font-size:11px;font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
.stag::before,.stag::after{content:'';width:20px;height:1.5px;background:var(--gold)}
.st{font-family:'Playfair Display',serif;font-size:clamp(32px,4vw,54px);font-weight:700;line-height:1.15;color:var(--dark)}
.st em{font-style:italic;color:var(--gold)}
.ss{font-size:15px;font-weight:300;color:var(--gray);max-width:480px;margin:16px auto 0;line-height:1.7}

/* CATEGORIES */
.cats{padding:100px 5%;background:var(--warm)}
.cg{display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:320px 320px;gap:16px}
.cc{position:relative;overflow:hidden;cursor:none;display:flex;align-items:flex-end}
.cc:first-child{grid-row:1/3}
.cbg{position:absolute;inset:0;transition:transform .6s cubic-bezier(.4,0,.2,1)}
.cc:hover .cbg{transform:scale(1.05)}
.cin{position:absolute;inset:0;background:linear-gradient(to top,rgba(28,28,30,.75) 0%,rgba(28,28,30,0) 55%);display:flex;align-items:flex-end;padding:28px;transition:background .4s}
.cc:hover .cin{background:linear-gradient(to top,rgba(28,28,30,.88) 0%,rgba(28,28,30,.1) 60%)}
.cl{font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.cn{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:white;line-height:1.1;margin-bottom:12px}
.cc:first-child .cn{font-size:42px}
.ck{font-size:11px;color:rgba(255,255,255,.45);margin-bottom:4px}
.clink{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:white;text-decoration:none;opacity:0;transform:translateY(8px);transition:opacity .3s,transform .3s}
.cc:hover .clink{opacity:1;transform:translateY(0)}

/* PRODUCTS */
.ps{padding:100px 5%;background:var(--cream)}
.tabs{display:flex;justify-content:center;gap:4px;margin-bottom:56px;background:var(--lg);padding:4px;width:fit-content;margin-left:auto;margin-right:auto}
.tb{padding:10px 28px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;background:none;border:none;cursor:none;color:var(--gray);transition:all .25s}
.tb.a{background:var(--dark);color:white}
.tb:hover:not(.a){color:var(--dark)}
.pg{display:grid;grid-template-columns:repeat(4,1fr);gap:24px}
.pc{background:white;cursor:none;transition:transform .3s,box-shadow .3s;position:relative;overflow:hidden}
.pc:hover{transform:translateY(-6px);box-shadow:0 24px 64px var(--shd)}
.piw{position:relative;overflow:hidden;aspect-ratio:3/4;background:var(--lg);display:flex;align-items:center;justify-content:center;font-size:80px}
.pc:hover .piw>:first-child{transform:scale(1.06)}
.pb{position:absolute;top:14px;left:14px;font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;padding:5px 10px}
.bn{background:var(--dark);color:white}
.bs{background:#D4472A;color:white}
.bh{background:var(--gold);color:white}
.pw{position:absolute;top:14px;right:14px;width:36px;height:36px;background:white;border:none;cursor:none;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.8);transition:opacity .3s,transform .3s;box-shadow:0 2px 12px var(--sh);color:var(--gray)}
.pc:hover .pw{opacity:1;transform:scale(1)}
.pw:hover{transform:scale(1.1)!important}
.pq{position:absolute;bottom:0;left:0;right:0;background:var(--dark);color:white;border:none;padding:14px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;cursor:none;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.pq:hover{background:var(--gold)}
.pc:hover .pq{transform:translateY(0)}
.pinfo{padding:18px 18px 20px}
.pcols{display:flex;gap:6px;margin-bottom:10px}
.cd{width:10px;height:10px;border-radius:50%;border:1.5px solid rgba(0,0,0,.12)}
.pn{font-size:14px;font-weight:600;color:var(--dark);margin-bottom:6px;line-height:1.3}
.pcat{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.ppr{display:flex;align-items:center;gap:10px;justify-content:space-between}
.pp{font-size:17px;font-weight:700;color:var(--dark)}
.po{font-size:13px;color:var(--gray);text-decoration:line-through}
.prat{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--gold);font-weight:600}
.pf{text-align:center;margin-top:56px}

/* FEATURES */
.fs{background:var(--gold-p);border-top:1px solid rgba(200,146,42,.2);border-bottom:1px solid rgba(200,146,42,.2);padding:0 5%;display:grid;grid-template-columns:repeat(4,1fr)}
.fi{padding:36px 24px;display:flex;align-items:center;gap:18px;border-right:1px solid rgba(200,146,42,.2)}
.fi:last-child{border-right:none}
.fic{width:48px;height:48px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 4px 16px rgba(200,146,42,.15)}
.fit strong{display:block;font-size:14px;font-weight:600;color:var(--dark);margin-bottom:3px}
.fit span{font-size:12px;color:var(--gray);line-height:1.4}

/* EDITORIAL */
.ed{padding:100px 5%;background:var(--warm)}
.eg{display:grid;grid-template-columns:1fr 1fr;gap:0;min-height:620px}
.em{position:relative;overflow:hidden;background:var(--dark);display:flex;align-items:center;justify-content:center}
.emb{position:absolute;top:40px;right:-12px;background:var(--gold);padding:10px 20px 10px 24px;font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:white}
.ec{background:var(--dark);padding:72px 64px;display:flex;flex-direction:column;justify-content:center}
.etag{font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:24px;display:flex;align-items:center;gap:12px}
.etag::before{content:'';width:24px;height:1.5px;background:var(--gold)}
.et{font-family:'Playfair Display',serif;font-size:clamp(32px,3.5vw,52px);font-weight:700;line-height:1.1;color:white;margin-bottom:24px}
.et em{font-style:italic;color:var(--gold-l)}
.eb{font-size:15px;font-weight:300;line-height:1.8;color:rgba(255,255,255,.5);margin-bottom:44px}
.ests{display:flex;gap:40px;margin-bottom:44px}
.es{border-left:2px solid var(--gold);padding-left:16px}
.esv{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:white;line-height:1}
.esl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-top:4px}

/* TESTIMONIALS */
.ts{padding:100px 5%;background:var(--cream)}
.tg{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.tc{background:white;padding:36px 32px;border:1px solid var(--border);position:relative;transition:transform .3s,box-shadow .3s}
.tc:hover{transform:translateY(-4px);box-shadow:0 16px 48px var(--sh)}
.tq{font-size:52px;line-height:.8;font-family:'Playfair Display',serif;color:var(--gold);margin-bottom:20px;display:block}
.tst{color:var(--gold);font-size:14px;letter-spacing:2px;margin-bottom:16px}
.tt{font-size:15px;line-height:1.75;color:var(--gray);font-weight:300;margin-bottom:28px;font-style:italic}
.ta{display:flex;align-items:center;gap:14px}
.tav{width:44px;height:44px;border-radius:50%;background:var(--lg);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--gold);font-family:'Playfair Display',serif}
.tn{font-size:14px;font-weight:600;color:var(--dark)}
.tr{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.ttg{position:absolute;top:28px;right:28px;background:var(--gold-p);color:var(--gold);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px}

/* NEWSLETTER */
.nl{padding:100px 5%;background:var(--dark);position:relative;overflow:hidden}
.nl::before{content:'TC';position:absolute;right:-2%;top:50%;transform:translateY(-50%);font-family:'Bebas Neue',sans-serif;font-size:min(30vw,380px);line-height:1;color:rgba(255,255,255,.03);pointer-events:none;letter-spacing:-.05em}
.nli{max-width:640px;margin:0 auto;text-align:center;position:relative}
.nltag{font-size:11px;font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:12px}
.nltag::before,.nltag::after{content:'';width:20px;height:1.5px;background:var(--gold)}
.nlt{font-family:'Playfair Display',serif;font-size:clamp(36px,4.5vw,56px);font-weight:700;color:white;margin-bottom:16px;line-height:1.1}
.nlt em{color:var(--gold-l);font-style:italic}
.nlsub{font-size:15px;color:rgba(255,255,255,.45);line-height:1.7;margin-bottom:44px}
.nlf{display:flex;gap:0;border:1px solid rgba(255,255,255,.12);overflow:hidden;max-width:520px;margin:0 auto}
.nli2{flex:1;padding:18px 22px;background:rgba(255,255,255,.06);border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:14px;color:white}
.nli2::placeholder{color:rgba(255,255,255,.3)}
.nli2:focus{background:rgba(255,255,255,.1)}
.nlb{background:var(--gold);color:white;border:none;padding:18px 32px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:none;transition:background .2s;white-space:nowrap}
.nlb:hover{background:var(--gold-l)}
.nlbs{display:flex;justify-content:center;gap:32px;margin-top:32px;flex-wrap:wrap}
.nb{display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,.35)}
.nb span{color:var(--gold)}

/* FOOTER */
footer{background:#111110;padding:80px 5% 40px;border-top:2px solid rgba(200,146,42,.2)}
.ftop{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:60px;margin-bottom:64px}
.flogo{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:.12em;color:white;margin-bottom:18px;display:block;text-decoration:none}
.flogo b{color:var(--gold)}
.fd{font-size:14px;color:rgba(255,255,255,.4);line-height:1.75;max-width:280px;margin-bottom:28px}
.fsoc{display:flex;gap:12px}
.sb{width:38px;height:38px;border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.4);text-decoration:none;font-size:14px;transition:all .2s;cursor:none}
.sb:hover{border-color:var(--gold);color:var(--gold)}
.fct{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:white;margin-bottom:22px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.06)}
.fl{list-style:none}
.fl li{margin-bottom:12px}
.fl a{text-decoration:none;font-size:13px;color:rgba(255,255,255,.4);transition:color .2s;cursor:none}
.fl a:hover{color:var(--gold)}
.fbot{padding-top:32px;border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.fcp{font-size:12px;color:rgba(255,255,255,.2)}
.fpy{display:flex;gap:10px;align-items:center}
.fp{padding:4px 10px;border:1px solid rgba(255,255,255,.1);font-size:10px;font-weight:600;letter-spacing:.08em;color:rgba(255,255,255,.3);text-transform:uppercase}

/* CART */
.ov{position:fixed;inset:0;background:rgba(28,28,30,.5);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px)}
.ov.o{opacity:1;pointer-events:all}
.cd2{position:fixed;top:0;right:0;bottom:0;width:min(440px,100vw);background:white;z-index:201;transform:translateX(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-20px 0 80px rgba(28,28,30,.2)}
.cd2.o{transform:translateX(0)}
.ch{padding:28px 28px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cttl{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--dark)}
.ccl{background:none;border:none;cursor:none;font-size:22px;color:var(--gray);line-height:1;padding:4px;transition:color .2s,transform .2s}
.ccl:hover{color:var(--dark);transform:rotate(90deg)}
.cb{flex:1;overflow-y:auto;padding:20px 28px}
.ci{display:flex;gap:16px;padding:16px 0;border-bottom:1px solid var(--border)}
.cimg{width:80px;height:96px;background:var(--lg);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:36px}
.cin2{font-size:14px;font-weight:600;color:var(--dark);margin-bottom:4px}
.cvar{font-size:12px;color:var(--gray);margin-bottom:8px}
.cprice{font-size:16px;font-weight:700;color:var(--dark)}
.cqty{display:flex;align-items:center;border:1px solid var(--border);width:fit-content;margin-top:8px}
.qb{background:none;border:none;cursor:none;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--dark);transition:background .15s}
.qb:hover{background:var(--lg)}
.qv{width:32px;text-align:center;font-size:13px;font-weight:600}
.crm{background:none;border:none;cursor:none;color:var(--gray);font-size:12px;transition:color .2s;margin-left:auto;align-self:flex-start}
.crm:hover{color:#D4472A}
.cf{padding:20px 28px 32px;border-top:1px
