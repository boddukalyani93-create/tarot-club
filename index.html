<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAROT CLUB — Premium Athletic Wear</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{--cream:#FAF7F2;--warm:#FFFEF9;--gold:#C8922A;--gold-l:#E8B84B;--gold-p:#FDF3DC;--dark:#1C1C1E;--gray:#6B6B6B;--lg:#E8E4DC;--border:#DDD8CE;--red:#D4472A;--green:#2A7D4F;--sh:rgba(28,28,30,.08);--shd:rgba(28,28,30,.18)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--warm);color:var(--dark);overflow-x:hidden}
/* SCROLLBAR */
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#f1f1f1}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}
/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:500;padding:0 4%;display:flex;align-items:center;justify-content:space-between;height:68px;transition:all .3s}
nav.s{background:rgba(255,254,249,.97);backdrop-filter:blur(20px);box-shadow:0 1px 0 var(--border)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.12em;color:var(--dark);text-decoration:none;cursor:pointer}
.logo b{color:var(--gold)}
.nav-links{display:flex;gap:32px;list-style:none}
.nav-links a{text-decoration:none;font-size:13px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--dark);position:relative;transition:color .2s;cursor:pointer}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:1.5px;background:var(--gold);transform:scaleX(0);transform-origin:left;transition:transform .3s}
.nav-links a:hover{color:var(--gold)}
.nav-links a:hover::after{transform:scaleX(1)}
.nav-r{display:flex;align-items:center;gap:14px}
.ni{background:none;border:none;color:var(--dark);padding:7px;position:relative;transition:color .2s;cursor:pointer;display:flex;align-items:center}
.ni:hover{color:var(--gold)}
.nbadge{position:absolute;top:2px;right:2px;width:16px;height:16px;background:var(--gold);color:white;border-radius:50%;font-size:9px;font-weight:700;display:none;align-items:center;justify-content:center}
.nbadge.show{display:flex}
.nav-btn{padding:9px 20px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;border:none;cursor:pointer;transition:all .2s}
.btn-login{background:transparent;color:var(--dark);border:1.5px solid var(--dark)}
.btn-login:hover{background:var(--dark);color:white}
.btn-signup{background:var(--gold);color:white}
.btn-signup:hover{background:var(--gold-l)}
.hbg{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:6px}
.hbg span{display:block;width:24px;height:2px;background:var(--dark);transition:all .3s}
/* MOBILE MENU */
.mob-menu{position:fixed;top:68px;left:0;right:0;background:white;z-index:499;border-bottom:1px solid var(--border);padding:0;max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s}
.mob-menu.open{max-height:500px;padding:16px 0}
.mob-menu a{display:block;padding:14px 5%;font-size:15px;font-weight:500;color:var(--dark);text-decoration:none;border-bottom:1px solid var(--border);cursor:pointer}
.mob-menu a:hover{color:var(--gold);background:var(--cream)}
.mob-auth{display:flex;gap:12px;padding:16px 5%}
/* TOAST */
.toast-wrap{position:fixed;top:80px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.toast{background:var(--dark);color:white;padding:14px 20px;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:500;box-shadow:0 8px 32px var(--shd);transform:translateX(120%);transition:transform .4s cubic-bezier(.4,0,.2,1);pointer-events:none;max-width:320px;border-left:3px solid var(--gold)}
.toast.show{transform:translateX(0)}
.toast.success{border-left-color:var(--green)}
.toast.error{border-left-color:var(--red)}
.toast-icon{font-size:16px;flex-shrink:0}
/* MODAL OVERLAY */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:800;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(6px)}
.modal-bg.open{opacity:1;pointer-events:all}
/* AUTH MODAL */
.auth-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.95);background:white;z-index:801;width:min(440px,94vw);padding:40px;opacity:0;pointer-events:none;transition:all .3s;border-top:3px solid var(--gold)}
.auth-modal.open{opacity:1;pointer-events:all;transform:translate(-50%,-50%) scale(1)}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray);transition:color .2s}
.modal-close:hover{color:var(--dark)}
.modal-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:6px}
.modal-sub{font-size:14px;color:var(--gray);margin-bottom:28px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--dark);margin-bottom:8px}
.form-input{width:100%;padding:13px 16px;border:1.5px solid var(--border);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--dark);outline:none;transition:border-color .2s;background:white}
.form-input:focus{border-color:var(--gold)}
.form-input::placeholder{color:#aaa}
.form-err{font-size:12px;color:var(--red);margin-top:5px;display:none}
.form-err.show{display:block}
.btn-full{width:100%;padding:15px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:none;cursor:pointer;transition:all .2s}
.btn-gold{background:var(--gold);color:white}
.btn-gold:hover{background:var(--gold-l)}
.btn-dark{background:var(--dark);color:white}
.btn-dark:hover{background:#333}
.modal-switch{text-align:center;margin-top:20px;font-size:14px;color:var(--gray)}
.modal-switch a{color:var(--gold);cursor:pointer;font-weight:600}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{font-size:12px;color:var(--gray)}
.oauth-btn{width:100%;padding:13px;border:1.5px solid var(--border);background:white;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:border-color .2s;margin-bottom:10px}
.oauth-btn:hover{border-color:var(--dark)}
/* CART DRAWER */
.cart-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px)}
.cart-ov.open{opacity:1;pointer-events:all}
.cart-drawer{position:fixed;top:0;right:0;bottom:0;width:min(420px,100vw);background:white;z-index:601;transform:translateX(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-16px 0 60px var(--shd)}
.cart-drawer.open{transform:translateX(0)}
.cart-head{padding:24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cart-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700}
.cart-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--gray);transition:all .2s;line-height:1}
.cart-close:hover{color:var(--dark);transform:rotate(90deg)}
.cart-body{flex:1;overflow-y:auto;padding:16px 24px}
.cart-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;text-align:center;padding:40px}
.cart-empty-icon{font-size:56px}
.cart-empty h3{font-family:'Playfair Display',serif;font-size:22px}
.cart-empty p{font-size:14px;color:var(--gray)}
.cart-item{display:flex;gap:14px;padding:16px 0;border-bottom:1px solid var(--border)}
.cart-item-img{width:76px;height:90px;background:var(--lg);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:36px;overflow:hidden}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:14px;font-weight:600;color:var(--dark);margin-bottom:3px;line-height:1.3}
.cart-item-variant{font-size:12px;color:var(--gray);margin-bottom:6px}
.cart-item-price{font-size:15px;font-weight:700;color:var(--dark)}
.cart-qty-row{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.qty-wrap{display:flex;align-items:center;border:1px solid var(--border)}
.qty-btn{width:30px;height:30px;background:none;border:none;cursor:pointer;font-size:16px;color:var(--dark);transition:background .15s;display:flex;align-items:center;justify-content:center}
.qty-btn:hover{background:var(--lg)}
.qty-val{width:34px;text-align:center;font-size:13px;font-weight:600}
.cart-rm{background:none;border:none;cursor:pointer;color:var(--gray);font-size:12px;text-decoration:underline;transition:color .2s}
.cart-rm:hover{color:var(--red)}
.cart-foot{padding:20px 24px 28px;border-top:1px solid var(--border);background:var(--cream)}
.promo-row{display:flex;gap:8px;margin-bottom:16px}
.promo-input{flex:1;padding:11px 14px;border:1.5px solid var(--border);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
.promo-input:focus{border-color:var(--gold)}
.promo-btn{padding:11px 18px;background:var(--dark);color:white;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:background .2s;white-space:nowrap}
.promo-btn:hover{background:var(--gold)}
.promo-applied{background:rgba(42,125,79,.1);border:1px solid var(--green);padding:10px 14px;font-size:13px;color:var(--green);font-weight:500;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.promo-rm{background:none;border:none;cursor:pointer;color:var(--red);font-size:18px;line-height:1}
.totals-row{display:flex;justify-content:space-between;font-size:13px;color:var(--gray);margin-bottom:6px}
.totals-total{display:flex;justify-content:space-between;font-size:18px;font-weight:700;color:var(--dark);padding:12px 0;border-top:1px solid var(--border);margin:8px 0 16px}
.free-ship{text-align:center;font-size:12px;color:var(--green);font-weight:600;margin-bottom:12px}
.ship-bar{height:4px;background:var(--lg);margin-bottom:16px;overflow:hidden}
.ship-bar-fill{height:100%;background:var(--green);transition:width .5s}
.checkout-btn{display:block;width:100%;padding:16px;background:var(--dark);color:white;text-align:center;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;border:none;cursor:pointer;transition:background .25s;text-decoration:none}
.checkout-btn:hover{background:var(--gold)}
/* PRODUCT MODAL */
.prod-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.95);background:white;z-index:802;width:min(820px,95vw);max-height:90vh;overflow-y:auto;opacity:0;pointer-events:none;transition:all .3s}
.prod-modal.open{opacity:1;pointer-events:all;transform:translate(-50%,-50%) scale(1)}
.prod-modal-inner{display:grid;grid-template-columns:1fr 1fr;gap:0}
.prod-modal-img{background:var(--lg);display:flex;align-items:center;justify-content:center;font-size:120px;min-height:400px;position:relative}
.prod-modal-info{padding:40px 36px;overflow-y:auto}
.prod-modal-cat{font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.prod-modal-name{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;line-height:1.2;margin-bottom:12px}
.prod-modal-rating{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.stars{color:var(--gold);letter-spacing:1px}
.rating-num{font-size:13px;color:var(--gray)}
.prod-modal-price{font-size:28px;font-weight:700;color:var(--dark);margin-bottom:4px}
.prod-modal-old{font-size:16px;color:var(--gray);text-decoration:line-through;margin-bottom:20px}
.prod-modal-desc{font-size:14px;line-height:1.7;color:var(--gray);margin-bottom:24px}
.option-label{font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;color:var(--dark)}
.size-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.size-btn{width:44px;height:44px;border:1.5px solid var(--border);background:white;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.size-btn:hover,.size-btn.sel{background:var(--dark);color:white;border-color:var(--dark)}
.size-btn.out{opacity:.4;cursor:not-allowed;text-decoration:line-through}
.color-row{display:flex;gap:10px;margin-bottom:24px}
.col-btn{width:32px;height:32px;border-radius:50%;border:3px solid white;box-shadow:0 0 0 1.5px var(--border);cursor:pointer;transition:box-shadow .2s}
.col-btn.sel{box-shadow:0 0 0 2.5px var(--gold)}
.qty-row{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.qty-big{display:flex;align-items:center;border:1.5px solid var(--border)}
.qty-big button{width:38px;height:38px;background:none;border:none;cursor:pointer;font-size:18px;color:var(--dark)}
.qty-big span{width:44px;text-align:center;font-size:15px;font-weight:600}
.prod-actions{display:flex;gap:10px;margin-bottom:20px}
.btn-atc{flex:1;padding:15px;background:var(--dark);color:white;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:background .25s}
.btn-atc:hover{background:var(--gold)}
.btn-wish{width:50px;height:50px;border:1.5px solid var(--border);background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:20px}
.btn-wish:hover,.btn-wish.active{border-color:var(--red);color:var(--red)}
.prod-features{border-top:1px solid var(--border);padding-top:16px}
.prod-feat-item{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--gray);margin-bottom:8px}
/* HERO */
.hero{min-height:100vh;background:var(--cream);display:grid;grid-template-columns:1fr 1fr;position:relative;overflow:hidden}
.hero-l{display:flex;flex-direction:column;justify-content:center;padding:120px 5% 80px 6%;position:relative;z-index:2}
.hero-tag{display:inline-flex;align-items:center;gap:10px;font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:28px;opacity:0;animation:fu .8s .2s ease forwards}
.hero-tag::before{content:'';width:28px;height:1.5px;background:var(--gold)}
.hero-h{font-family:'Playfair Display',serif;font-size:clamp(44px,5.5vw,82px);font-weight:900;line-height:1.0;letter-spacing:-.02em;color:var(--dark);margin-bottom:26px;opacity:0;animation:fu .9s .35s ease forwards}
.hero-h em{font-style:italic;color:var(--gold);display:block}
.hero-sub{font-size:16px;font-weight:300;line-height:1.7;color:var(--gray);max-width:400px;margin-bottom:40px;opacity:0;animation:fu .9s .5s ease forwards}
.hero-btns{display:flex;gap:14px;flex-wrap:wrap;opacity:0;animation:fu .9s .65s ease forwards}
.btn-primary{background:var(--dark);color:white;padding:15px 34px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;border:none;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;display:inline-block;text-decoration:none}
.btn-primary::before{content:'';position:absolute;inset:0;background:var(--gold);transform:translateX(-101%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
.btn-primary:hover::before{transform:translateX(0)}
.btn-primary span{position:relative;z-index:1}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px var(--shd)}
.btn-outline{background:transparent;color:var(--dark);padding:14px 30px;border:1.5px solid var(--dark);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .25s;text-decoration:none;display:inline-block}
.btn-outline:hover{background:var(--dark);color:white;transform:translateY(-2px)}
.hero-stats{display:flex;gap:32px;margin-top:56px;opacity:0;animation:fu .9s .8s ease forwards}
.stat{border-left:2px solid var(--gold);padding-left:14px}
.stat-n{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;line-height:1}
.stat-l{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);margin-top:3px}
.hero-r{position:relative;overflow:hidden;opacity:0;animation:fi 1.2s .3s ease forwards}
.hero-vis{width:100%;height:100%;min-height:60vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#EDE8E0 0%,#D4C8B8 40%,#B8A890 100%);font-family:'Bebas Neue',sans-serif;font-size:clamp(70px,11vw,150px);color:rgba(200,146,42,.13);letter-spacing:-.05em;user-select:none;flex-direction:column;line-height:.9}
.hero-badge{position:absolute;bottom:44px;left:-20px;background:white;padding:18px 22px;box-shadow:0 16px 48px var(--shd);display:flex;align-items:center;gap:12px;animation:flt 4s ease-in-out infinite}
.hbi{width:42px;height:42px;background:var(--gold-p);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.hbt p:first-child{font-size:13px;font-weight:600}
.hbt p:last-child{font-size:11px;color:var(--gray);margin-top:1px}
.hero-scroll{position:absolute;bottom:28px;left:6%;display:flex;flex-direction:column;align-items:center;gap:6px;opacity:0;animation:fi 1s 1.2s ease forwards}
.scroll-line{width:1px;height:46px;background:linear-gradient(to bottom,transparent,var(--gold));animation:sp 2s ease-in-out infinite}
.scroll-txt{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--gray)}
/* MARQUEE */
.marquee{background:var(--dark);padding:16px 0;overflow:hidden;border-top:2px solid var(--gold)}
.marquee-track{display:flex;animation:mq 28s linear infinite;width:max-content}
.marquee-item{display:flex;align-items:center;gap:28px;padding:0 36px;font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.4);white-space:nowrap}
.marquee-item b{color:var(--gold)}
/* SECTION */
.sec{padding:90px 5%}
.sec-head{text-align:center;margin-bottom:60px}
.sec-tag{display:inline-flex;align-items:center;gap:10px;font-size:11px;font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.sec-tag::before,.sec-tag::after{content:'';width:18px;height:1.5px;background:var(--gold)}
.sec-title{font-family:'Playfair Display',serif;font-size:clamp(30px,4vw,52px);font-weight:700;line-height:1.15;color:var(--dark)}
.sec-title em{font-style:italic;color:var(--gold)}
.sec-sub{font-size:15px;font-weight:300;color:var(--gray);max-width:460px;margin:14px auto 0;line-height:1.7}
/* CATEGORIES */
.cat-grid{display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:300px 300px;gap:14px}
.cat-card{position:relative;overflow:hidden;cursor:pointer;display:flex;align-items:flex-end}
.cat-card:first-child{grid-row:1/3}
.cat-bg{position:absolute;inset:0;transition:transform .6s cubic-bezier(.4,0,.2,1)}
.cat-card:hover .cat-bg{transform:scale(1.06)}
.cat-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(28,28,30,.78) 0%,transparent 55%);display:flex;align-items:flex-end;padding:26px;transition:background .4s}
.cat-card:hover .cat-overlay{background:linear-gradient(to top,rgba(28,28,30,.9) 0%,rgba(28,28,30,.1) 60%)}
.cat-label{font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:5px}
.cat-name{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:white;margin-bottom:10px;line-height:1.1}
.cat-card:first-child .cat-name{font-size:40px}
.cat-count{font-size:11px;color:rgba(255,255,255,.45);margin-bottom:10px}
.cat-link{font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:white;opacity:0;transform:translateY(8px);transit
